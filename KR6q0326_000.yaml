front:
  text: 天童平石和尚語録序至正十七年臨濟第十八代孫天童平石禪師砥公示般涅槃於東堂又九年其徒大用等集其三會所說法刻梓以傳以余逮見禪師俾為序竊惟臨濟乃達磨十世以大機大用弘教外別傳之旨度人不可紀極歷傳至徑山無準範公其宗益盛無準傳天童西巖惠公西巖傳東巖日公皆所謂得其道而能大其家者也為西巖的孫東巖上足而位望隆然以相繼者禪師焉又能以其道大振於東南天下學者莫不宗仰嘗觀其提唱之際徵辨之時擒縱與奪雷奔電激悚神駴目莫可擬測而使學者渙然而疑釋超然以有得苟非善臨濟之機用曷能若是所謂本固而末茂源遠而流益清者歟宋南渡初禪學大弊學者罔識臨濟機用往往淪於默照邪禪吾祖妙喜力排之而後禪學以正禪師行介而和言簡而要平居著述恆以斥邪說為務抑亦妙喜之意歟嗚呼禪師已矣不可復見矣欲求其道之倣佛捨是録其焉從俄有詰豫者曰達磨不立文字禪師乃存是録得無相矛盾耶豫應之曰達磨不立者所以祛文字之蔽禪師存是者所以明別傳之旨苟祛其蔽而得其旨不亦善乎淨名曰依於義不依語又曰言說文字皆解脫相有味哉有味哉詰者默然遂書以為平石禪師語録序前住紹興崇報禪寺鄱陽釋至仁書
