body:
  text: 目次序慶元路保聖禪寺語録定水禪寺語録天童禪寺語録真讚偈頌跋平石和尚初住慶元路保聖禪寺語録台州真如禪寺嗣法比丘文栖等編師於大德三年三月十五日入寺佛殿燒香云佛身無為不墮諸數乾屎橛麻三斤聻遂禮拜祖堂顢顢頇頇百醜千拙扶桑人種陝西田一二三四五六七據室拈主丈德山棒臨濟喝石裂崖崩雷轟電掣卓主丈君子可八升座拈香云此香恭為祝延今上皇帝聖躬萬歲萬歲萬萬歲次拈香云奉為見住太白名山天童景德禪寺東巖大和尚一爐爇却不是報德酬恩只要辱他則箇遂就座延慶和尚白椎云法筵龍象衆當觀第一義師云若是第一義直是無下口處即今莫有問話者麼山僧向第二義門與汝相見僧出云一統乾坤境象優騰騰瑞氣藹林丘提來殺活金剛劍凜凜神光射斗牛為國開堂願聞法要師云祝融峰頂上露滴萬年松進云恁麼則四海盡歸王化裏吾家曲子萬年歡師云滿口道著進云只如馬大師道即心即佛非心非佛意旨如何師云千年常住一朝僧進云萬機休罷千聖不携又作麼生師云眼不見為淨進云萬古碧潭空界月再三撈摝始應知師云亂統禪和如麻似粟僧禮拜師云果然乃云門外湖光湛湛屋頭翠竹青青車馬駢闐人煙雜遝智莫能知識莫能識所謂佛佛授手為授此事祖祖相傳為傳此宗驀拈主丈天左旋地右轉日東上月西落一道虗凝湛然光彩便與麼隔大千不與麼口皮邊皇元一統封疆闊願祝吾君億萬年卓主丈復舉達磨大師偈云吾本來茲土傳法救迷情一花開五葉結果自然成師云恁麼道大似傍若無人擊拂子云今年桃李貴一顆直千金下座上堂一二三四五六七鶻眼龍睛搆不及七六五四三二一鐵額銅頭跳不出熾如猛𦦨利若吹毛近之則燎却面門擬之則傷鋒犯手去此二途如何趣向衆中忽有箇漢出來掀倒禪床喝散大衆保聖也怪他不得便下座上堂魯祖面壁雪峰輥毬動絃別曲葉落知秋便與麼會時如何銅砂羅裏滿盛油上堂同床各夢異姓同居千變萬化少實多虗渠今不是我我今不是渠休將白額虎喚作黑於菟冬至小參衲僧門下有一片無陰陽田地坦然平正卓爾孤危近在方寸之間遠隔大千之外幾度風吹日炙多年草蔓苔荒是汝諸人尋常不曾將眼覷著覷得著萬象森羅光爍爍覷不著萬象森羅光爍爍總不與麼時如何焦磚打著連底凍一枝紅𦦨發冰河上堂云心外無法法外無心山河大地甚處得來便下座上堂舉三角和尚因僧問如何是三寶答云禾麥豆師云三角與麼道大似將常住物作自己受用其奈傍觀者哂忽有人問保聖如何是三寶只向他道佛法僧何故千虗不如一實除夜小參最初機末後句大地載不起佛手攔不住衲僧家見如不見聞如不聞行但行坐但坐飢喫飯寒向火管甚斗換星移寒來暑往門外朔風凜凜誰為途路之人櫩前凍日熙熙盡是到家之客保聖今夜未免烹露地白牛與諸人分歲去也驀拈主丈卓一下明年更有新條在惱亂春風卒未休復舉僧問古德年窮歲盡時如何古德云家家看盡野狐兒頌云家家看盡野狐兒正是年窮歲盡時何似東村廖胡子倒拈鐵笛逆風吹元宵上堂衲僧門下別有新條得路塞路過橋斷橋須知正月半決定是元宵以拂子擲下云我見燈明佛本光瑞如此佛忌上堂舉世尊將般涅槃以手摩胸告衆云汝等善觀吾紫磨金色之軀瞻仰取足毋令後悔今日則有明日則無若謂吾滅度非吾弟子謂吾不滅度亦非吾弟子時百萬億衆悉皆契悟頌云將謂無人識得渠臨行賣弄紫金軀當時一衆無人會獨許波旬是丈夫上堂三世諸佛說夢六代祖師說夢天下老和尚說夢莫有各床同夢底麼出來說看良久云人貧智短馬瘦毛長結夏小參圓覺伽藍廓周沙界平等性智普現色身行住坐臥常在其中見聞覺知莫過於此是衆生之業識乃諸佛之本源即諸佛之本源是衆生之業識所以道迷諸佛之所悟者是名衆生悟衆生之所迷者是名諸佛衆中忽有箇漢出來道者裏是什麼所在說迷說悟我也知你向鬼窟裏作活計良久主丈且將留靠壁草鞋乾晒待秋風上堂舉肇法師云萬法無異者豈曰續鳧截鶴夷嶽盈壑然後為無異者哉師云肇法師弘經造論可謂宗說俱通若約衲僧門下水也未與他喫保聖敢道若要萬法無異者直須續鳧截鶴夷嶽盈壑始得雖然笑我者多哂我者少開爐上堂少室單傳旨年深冷似灰一爐文武火今日為君開擊拂子下座達磨忌拈香是大妖孽剛道初祖甜瓜徹蒂甜苦瓠連根苦殃及後代兒孫箇箇釘樁搖櫓木人無舌笑春風燈籠吞却露明柱四月八日赴定水請辭衆上堂世尊出世保聖退步彼此大丈夫各自行一路拈主丈卓一下靈蹤更在𤠔啼處平石和尚定水禪寺語録門人子昶了因等編師於皇慶二年四月十二日入寺指山門云百千法門門門有路蝦蟆跳上梵天蚯蚓抹過東海指座向上一路千聖不傳天平地平日面月面遂升座拈香祝聖罷就座僧出云世尊拈花迦葉微笑未審此意如何師云休將鶴唳誤作鶯啼進云世尊道吾有正法眼藏分付摩訶大迦葉又作麼生師云一犬吠虗千獒啀實進云靈山拈花分付正法眼藏雙峰今日開堂畢竟有何垂示師云杲日當空清風匝地進云有意氣時添意氣不風流處也風流師云切忌亂針錐僧禮拜師乃云大機普應大用現前一句定剛宗橫身當宇宙豈不見保壽開堂三聖推出一僧保壽便打斬丁截鐵三聖云與麼為人非但瞎却者僧眼瞎却鎮州一城人眼去在殺人刀保壽擲下主丈便歸方丈活人劒好大衆如上將軍七事隨身沙場慣戰非惟電捲星馳直是超今邁古只如山僧今日開堂畢竟明箇什麼良久三邊不用安戈甲萬里歌謠賀太平結夏上堂舉東山和尚示衆云結夏無可供養大衆作一家燕管顧諸人遂擡手云囉囉招囉囉搖囉囉送莫怪空踈伏惟珍重師云東山和尚與麼施設也是禮過成諂定水則不然驀拈主丈靠左邊下座上堂古人道我有一句子待特牛生兒却向汝道且道是什麼一句子雙峰不惜眉毛與汝諸人說破若喚作一句子入地獄如箭射上堂異種靈苗春生夏長信手拈來無不是藥驀拈主丈召大衆云者箇是主丈子還喚作藥得麼擲下主丈云眼裡有筋須辨取文殊曾被善財瞞上堂四月十五日結左搓芒繩縛鬼子七月十五日解倒拈折筯攪滄溟衲僧家不慕諸聖不重己靈脫略上古風規破壞今時窠臼拈主丈一束生芻拈未暇六環金錫響遙空上堂有一人長在家舍不離途中有一人長在途中不離家舍拈主丈兩箇漢鼻孔總被雙峰穿却了也卓主丈不經一事不長一智上堂孟夏已過半月普天匝地漸熱衲僧鼻直眼橫那箇皮下無血九旬禁足安居剛道憐鵝護雪更說克期取證大似虗空釘橛煮砂未必成飯陽焰如何止渴雙峰無可論量一句為君直截但能無事於心自然應時應節擊拂子下座上堂六月雨無價寶高田低田水盈盈早禾晚禾雲眇眇農夫聚首話年豐斗米三錢端可保衲僧家沒頭腦飽飯噇眠知恩者少解夏小參布袋頭捻聚放開吞却山河大地主丈子橫來竪去挑幹日月星辰如理如事全主全賓風流直是風流奇特不妨奇特拍禪床行到水窮處坐看雲起時復舉教中道八十誦律一夏之功不階四果必證三禪師云把本修行如驢拽磨衲僧家合作麼生良久有口只堪閒掛壁上堂提起數珠云百八摩尼一串穿今年又數到明年明年又是從頭起百八摩尼一串穿大衆且道前不停五後不至七畢竟如何嘉州大像喫鹽多陝府鐵牛添得渴上堂動若行雲止猶谷神休將北斗喚作南辰只如山僧一月以來半出半入或東或西畢竟成得什麼邊事回首紅塵沒馬深行人更在青山外上堂舉雲門拈主丈示衆云主丈子化為龍吞却乾坤了也山河大地甚處得來先師東巖和尚拈云天童亦有主丈子雖不曾變化直是易見難識擲下主丈云向道是龍剛不信待為霖雨始應知師拈主丈召大衆云物見主眼卓竪卓主丈只知開口易不覺舌頭長上堂寒山子詩云白鶴㗸苦花千里作一息欲往蓬萊山將此充糧食好諸禪德向者裡瞥地者多錯會者亦不少所以道我詩也是詩有人喚作偈詩偈總一般讀時須仔細九日上堂今朝九月九相喚不出手若是箇中人舉意便知有拍禪床云金雞飛上玉䦨干一聲啼破千峰曉上堂舉馬祖玩月次智藏百丈南泉侍立祖曰正與麼時如何藏云正好修行丈云正好供養南泉拂袖便去祖云經歸藏禪歸海唯有普願獨超物外師云馬大師一家父子只解貪觀天上月不知失却手中橈雙峰則不然正與麼時如何青天也須喫棒都道場看經歸上堂一大藏教是箇切腳且道切甚麼字諸仁者出一叢林入一保社一七日內朝看暮閲還有覷得透底麼若覷得透非唯仰報聖恩抑亦慶快自己若覷不透被黑豆子換却眼睛了也驀拈主丈雙峰不惜眉毛曲施方便向第二義門與諸人相見卓主丈閙市拶出憍尸迦驚起憨憨梵王睡上堂衲僧家只解步步登高不解從空放下且道誵訛在什麼處良久云下座巡堂喫茶上堂舉芭蕉示衆云你有主丈子我與你主丈子你無主丈子我奪却你主丈子後來真淨和尚拈云你有主丈子我奪却你主丈子你無主丈子我與你主丈子師云二大老向有無與奪中作活計檢點將來合喫主丈雙峰不欲盡法無民放過一著靠主丈下座上堂雲門有一曲臘月二十五直下會得未敢相許何故射虎不真徒勞沒羽除夜小參過去已過去生鐵稱鎚被蟲蛀未來猶未來燈籠沿壁上天台即今臘月三十日也見在底作麼生一法若有毗盧墮在凡夫萬法若無普賢失其境界竪拂子東弗于逮西瞿耶尼南瞻部洲北單越即今在山僧拂子頭上轉大法輪汝等諸人還見麼擊拂子城上已吹新歲角窗前猶點舊年燈復舉香林因僧問萬頃荒田誰是主林云看看臘月盡師云香林與麼答話幾被打破蔡州忽有人問定水萬頃荒田誰是主只向他道三年一閏五年再閏元旦上堂舉法昌遇和尚因僧問孟春猶寒即不問新年頭還有佛法也無法昌云東山西嶺青頌云新年佛法聊相問解道東山西嶺青昨夜陽和回地底十分春色滿江城上堂準擬看元宵恰值終朝雨燈燭照笙歌遊人不出戶一段好風光特地成孤負雪峰輥毬禾山打鼓笑倒燈籠并露柱佛涅槃上堂教中道涅而不生槃而不滅不生不滅故曰涅槃竪拂子釋迦老子來也還見麼一翳在眼空花亂墜上堂舉雲門云久雨不晴衲僧家向甚處晒㫰皮草師云本自無瘡勿傷之也結夏上堂舉天平訪西院被連下兩錯更留開粥過夏共相商量師云盡謂西院炊香別甑禮意殷勤殊不知利刃之蜜蠱毒之水雙峰者裏粗茶淡飯任意加餐雖然九十日內十二時中也要大家知慚識愧道場渭都管施傳燈上堂人從霅川來接得西天信報道真燈發焰爍破大虗雙峰歡喜不徹合掌讚云三腳驢子弄蹄行踢倒須彌無寸土上堂孟夏漸熱年年事三世如來總不知昨夜燈籠開口笑堂前露柱皺雙眉端午上堂今朝五月五此話憑誰舉擎起祕魔叉打動禾山鼓直得南山起雲北山下雨喝一喝赤口白舌盡消除不用當門懸艾虎上堂舉雲門示衆云結夏已過二十日寒山子作麼生自代云和尚問寒山學人對拾得親言出親口平地成狼藉會麼雙峰與麼道也是普州人送賊上堂日出心光耀天陰性地昏不知天地者剛道有乾坤喝一喝我行荒草裡汝又入深村解夏小參教流像季去聖時遙土曠人稀言多道遠欲得摧邪顯正故須託境依人人境既以一如道業自然成辦山僧九十日已前與汝諸人同一安居九十日已後與汝諸人同一自恣行住坐臥語默動靜與諸人初無絲毫間隔若是宗乘邊事未嘗蹉口道著何故雙峰不曾引人落草復舉翠岩參和尚示衆云一夏與兄弟東語西話看翠岩眉毛在麼頌云翠岩眉毛在不在山未為高海未深一曲無絃千古意相逢誰是好知音解夏上堂鵝護雪臘人冰此地無金二兩俗人沽酒三升拍禪牀堪笑暮雲歸未合遠山無數碧層層上堂舉雪竇和尚偈云三分光陰二早過靈臺一點不揩磨貪生逐日區區去喚不回頭爭奈何師云膏肓之疾固不足以發藥然雙峰用處也要諸人共知便下座中秋上堂吾心似秋月碧潭清皎潔無物堪比倫教我如何說師云寒山子與麼道大似抱贓呌屈便下座為雲山劉氏孺人對靈小參若論此事譬如秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散諸佛悟之而成佛衆生迷之而受生迷諸佛之所悟者是名衆生悟衆生之所迷者故曰諸佛心佛及衆生是三無差別者箇道裡如人飲水冷暖自知說似人不得呈似人不得離男女相離生死相諸相既無一靈不昧豈不見昔日范縣君參圓悟祖師教伊看不是心不是佛不是物不得下語不得開口看來看去便覺恓惶却問別有何方便得箇入處圓悟云有箇方便不是心不是佛不是物縣君從此悟入大衆看他是箇婦人宛有大丈夫之作直得渾鋼打就生鐵鑄成煩惱恩愛籠他不得生老病死繫縛他不得要行便行要住便住直饒恁麼猶在半途且道即今劉氏孺人出生入死超然獨脫底一句又作麼生竪起拂子稽首摩耶千佛母天花影裏現全身開爐上堂兼謝雪窗書記雙峰火爐頭有一則無賓主話只是易見難識良久夫子不識字達磨不會禪除夜小參少室九年面壁掘地覔天黃梅半夜傳衣敲冰取火事久情變法立弊生一犬吠虗千獒啀實不是向上巴鼻亦非教外別傳人漸老水長流一年又是結交頭出門撞著留幽求大帽壓耳手提油正旦上堂舉真淨和尚歲朝示衆云去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無香嚴與麼提持奇特甚奇特要且只知其貧不知其富洞山則不然去年富未是富今年富始是富去年富只有一領黑黲布褊衫今年富添得一頂百衲山水袈裟歲朝抖擻呈禪衆實謂風流出當家師云貧賊驕人乎富貴驕人乎吾於二老見之矣雙峰既不言貧亦不道富新年頭別有一句子也要大家知有竪拂子雲淨日月正雪晴天地春上堂有物先天地無形本寂寥能為萬象主不逐四時凋春耕夏種秋收冬藏作麼生說不凋之義山南山北無非祖父田園溪東溪西總是國王水草汝等諸人若也知得落處便見進退動靜之間了無新舊去來之相坐籌帷幄安帖家正與麼時如何三腳驢子弄蹄行踏破虗空成兩片平石和尚天童禪寺語録參學比丘彌安元勗等編師於天曆二年十二月初一日入寺指山門云樓閣門開日照天臨俊馬不移蹄快鶻趂不及喝一喝佛殿燒香云自覺覺他名之曰佛金剛與泥人揩背咄咄咄據室我此一室綿綿密密眨得眼來青天霹靂升座拈香云此香陰陽未剖已前掀天富貴世界既形之後特地芬芳爇向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲陛下恭願明逾日月德重乾坤萬年端拱於無為四海咸皈於至化次拈香云村草步頭匙挑不上玲瓏岩畔信手拈來今當第三回供養前住當山先師東岩圓應大和尚用酬法乳之恩斂衣就座育王和尚白槌畢師云盡大地撮來如粟粒大拋向面前漆桶不會打鼓普請看衆中莫有不甘者麼出來道看時有僧問云三通鼓罷大衆咸臻學人上來願聞祝贊師云須彌頂上擊金鐘進云祝聖已蒙師指示向上宗乘事若何師云黃檗打臨濟六十主丈進云記得三聖道逢人則出出則不為人時如何師云有甚巴鼻進云興化道逢人則不出出則便為人又且如何師云却較些子進云古今無異路達者共同途師便喝僧禮拜師云不快漆桶乃云萬仞峰前輥繡毬三千剎海一毫收展開佛手伸驢腳出窟金毛笑點頭所以道宗乘一唱三藏絶詮正令當行十方坐斷是故靈山會上少室峰前赤手持來橫身荷負德山棒頭欺胡瞞漢臨濟喝下少實多虗擘泰華逗黃河直得星移斗換捎金雞拂玉兔自然八面玲瓏是皈馬休牛之日當樵歌漁唱之時摩醯正眼洞明肘後靈符光彩正與麼時如何天高群象正海闊百川朝小參從上來事只在如今拈起也天回地轉放下也滴水冰生不在句後聲前自然頭頭顯露九峰聳翠雙沼波澄乃宏智中興之所誠祖父唱道之場繼茲芳躅撫膺有愧所以緣生於象象亦非真緣象兩忘觸途成滯拈主丈主丈橫山河大地一時橫主丈竪山河大地一時竪主丈不橫不竪山河大地自山河大地燈籠自燈籠露柱自露柱然雖如是只如雲門大師道拈燈籠向佛殿裏將山門來燈籠上又作麼生話會卓主丈一言截斷千江口萬仞峰頭始得玄復舉當山第一代啓禪師因僧問學人卓卓上來請師的的啓云我者裡一屙便了有甚麼卓卓的的僧云和尚恁麼答話更買草鞋行腳始得啓喚僧近前僧乃近前啓云老僧恁麼道過在什麼處其僧擬議啓便打師云千鈞之弩不為鼷鼠發機者僧既不善機宜啓和尚亦成不了拈主丈喝一喝下座上堂即心即佛非心非佛不是心不是佛不是物馬大師舌頭無骨與麼也得不與麼也得與麼不與麼總得老石頭眼裏無筋驀拈主丈卓一下雲自帝鄉去水從江漢流除夜小參臘月三十日二年同一春祖師門下客總是舊時人大衆人既仍舊法無不然是故天地覆載日月運行河嶽流峙寒暑推遷無一法從內而出無一法從外而入拈主丈無言童子唱巴歌露柱燈籠齊起舞卓主丈元旦上堂拈拂子作書空勢召大衆云看看新年把筆萬事大吉且道書底是什麼孔門弟子無人識碧眼胡僧笑點頭上堂舉趙州問南泉云如何是道泉云平常心是道大衆苦樂逆順膏火相煎剎那之間有萬生滅作麼生得平常去到者裏也須明白去始得涅槃上堂正法眼藏涅槃妙心東土乾籮蔔西天爛葛藤野火年年燒不盡春風吹著又重生上堂舉天衣懷禪師示衆云青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中南山起雲北山下雨會麼甜瓜徹蒂甜苦瓠連根苦應菴和尚拈云天童也下一著青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中狗子尾巴書梵字野狐窟宅梵王宮師云山僧有條舉條無條攀例今日也下一著青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中奇怪石頭形似虎火燒松樹勢如龍延慶我菴和尚至上堂青玉軒前玲瓏岩畔歷歷明明現成公案靠倒直指單傳抹過一心三觀且道四明尊者隰州古佛相見說箇什麼良久止止不須說我法妙難思擊拂子下座純監寺火純清絶點坐在無魂必死之鄉若要去住自由別資一路始得擲下火三腳驢子弄蹄行火裏毒蛇吞鱉鼻浴佛上堂十方世界香水海萬象森羅淨法身須信鑊湯無冷處杓頭拋下辨踈親結夏上堂一年是一年一月是一月一日是一日一時是一時聖制九旬各自努力其間更有一事說與諸人不得良久切忌向胡餅裡覓汁上堂云藏主不識字侍者參得禪首座有長處各自見一邊掀翻洞山五位擘開臨濟三玄須彌峰頂浪滔天上堂拈主丈云佛法遍天下談玄口不開相𢹂木上座吟上高高臺且道太白峰與玲瓏岩鬪額畢竟論量何事卓主丈湖南城裏好養民米賤柴多足四鄰端午上堂五月五天中節神仙妙藥百草頭邊等閒嗅著腦門迸裂喝一喝下座上堂諸禪德還知麼今朝又是六月十五日了也寒暑相催生死漸近身上鶻臭布衫還脫得下也未脫得脫不得則且置你道南山起雲北山下雨畢竟又如何話會喝一喝上堂舉東山演和尚頌云山前一片閒田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風師云東山與麼道如持左券以取故物自謂手親眼辦不受人瞞檢點將來費了多少鹽醬諸人還會麼玉本無瑕雕文喪德東岩和尚忌辰拈香香嚴哭溈山主丈貧兒思舊債投子受大陽革履冒姓佃官租總是死門俱非活路插香云先師東岩和尚來也龍袖拂開全體露象王行處絶狐踪解夏小參九旬禁足三月安居據菩薩乘修寂滅行正是無風匝匝之波致令影響之流彼此互揚家醜便道鵝護雪臘人冰鋤得一片畬種得一籮粟自謂修心煉行功不浪施檢點將來自救不了天童則不然一箇箇如獅子兒吒沙地哮吼一聲直得天魔膽裂有甚近傍處是則固是還端的也無擊拂子西風陳陳凉秋雨番番急舉翠岩參和尚示衆云一夏與兄弟東語西話看翠岩眉毛在麼保福云作賊人心虗長慶云生也雲門云關大衆翠岩老老大大賣弄風流引得一地人揚塵簸土百世之下喚作翠岩眉毛話山僧今夜忍俊不禁與伊勦絶去也衆中忽有箇漢出來道和尚也須照顧眉毛始得我也知你向鬼窟裡作活計解夏上堂教中道自宣己過恣僧舉罪名曰自恣若約衲僧門下天地懸殊直須毀於佛謗於法無慚愧心乃可名為自恣拈主丈云當門不用栽荊棘後代兒孫惹著衣上堂山僧夜來得一夢甚是奇特天明起來擬欲舉似諸人及乎仔佃尋思又成忘却便下座隨都寺火心隨萬境轉轉處實能幽涅槃路上生死岸頭撲滅漏燈盞撥火覓浮漚上堂炎炎老火向西流一雨翻然報早秋暑往寒來今古事幾多白盡少年頭上堂十五日已前半明半暗十五日已後全暗全明正當十五日明暗兩途二俱不涉拍禪牀三面狸奴腳踏月兩頭水牯手拏煙重陽上堂茱萸滿泛一甌茶冷淡家風亦自佳不用登臨追往事眼前隨分有黃花達磨忌日拈香西天殿後東土先鋒不識第一義剛言破六宗老蕭硬寨打不入渾身乾沒熊耳峰不有宋雲知敗缺擬於何處覓行踪兼侍者火雙弘定慧兼善毗尼生死岸頭了無交涉擲下火犀牛扇子足清風火裡蝍蟟吞大蟲上堂清霜鋪大野白月滿空山目前明歷歷一點不相瞞擊拂子下座宏智和尚忌日拈香夢幻空花六十七年白鳥煙沒秋水天連渾侖無縫罅竇八布衫穿丹霞室內太白峰前正偏俱不涉生死不相干夜行只管貪明月不覺和衣渡水寒冬至小參佛法二字也是不著便衲僧家從朝至暮著衣喫飯痾屎送尿何嘗有虗棄底時節豈不見龐居士頌云日用事無別惟吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絶點埃神通并妙用運水及搬柴諸仁者看他是箇俗流宛有衲僧氣息若向者裡著得一隻眼觀風雲別氣候觸目遇緣隨機應變灼然無虗曇底時節苟或未然且向陰陽消長處一任東卜西卜復舉洞山冬夜與泰首座喫果子次問云有一物黑似漆常在動用中動用中收不得過在什麼處泰首座云過在動用中洞山令侍者掇退果卓師云泰首座恁麼答話本分不得果子喫雖然洞山也不得無過即今若有人下一轉語坐斷古人舌頭天童向明窗下安排上堂舉僧問古德如何是冬來事古德云京師出大黃師云與麼答話大似徐六擔板驀拈主丈卓一下三生六十劫上堂山寺逢冬仲蕭條迫暮年官租猶未納私債苦相煎私猶可緩官急如弦無人知此意令我憶南泉上堂舉洞山不安有僧問云和尚病還有不病者麼山云有僧云不病者還看和尚否山云我看他有分僧云和尚看他時如何山云則不見有病輒成一偈舉似諸人病時還有不病者他不看吾吾看他一陳香風來枕上庭梅開遍臘前花關山和尚忌日拈香木有本水有源佛佛授手祖祖相傳理固如是事無不然插香云涅槃後有大人相剔起眉毛仔細看除夜小參去也去也𪹼竹送殘年來也來也椒柈獻新歲一來一去全放全收不作佛法商量不作世諦流布目前無法意在目前狸奴白牯共樂升平露柱燈籠咸霑化育直得冰河發焰黍谷回陽道泰時清民康物阜拍禪牀云品字柴頭煨正暖不知風雪到梅花上堂舉法昌結夏示衆云年年四月十五諸方盡皆禁足法昌山裡如何但見山青水緑師云法昌老漢坐在無事甲裏有甚共語處喝一喝上堂舉雪竇偈云霏霏梅雨灑危層五月山房冷似冰莫謂乾坤乖大信未明心地是炎蒸好諸禪德真語者實語者如語者不異語者便下座上堂舉真淨和尚云今朝六月旦萬事隨時變地肥茄子多雨足甜瓜賤紅桃大似拳緑李圓如彈誰識歸宗大道心拈來一一人難辨古人和盤托出只堪止渴不可充飢天童者裡無三般兩樣只作一味商量小間僧堂裡索一任諸人飽喫便下座解夏小參明明百草頭明明祖師意所以道道遠乎哉觸事而真聖遠乎哉體之則神現前一衆同此安居今已告圓只如雲門大師問僧云秋初夏末不落平常道將一句來僧無對自代云初三十一中九下七師拈主丈卓一下云西天斬頭截臂我者裡自領出去復舉洞山示衆云秋初夏末兄弟東去西去直須向萬里無寸草處去石霜聞云出門便是草頌云萬里無寸草出門便是草昨夜問龜哥報道今朝好步步踏著長安道上堂西風陳陳凉秋雨番番急時節不相饒一夏今朝畢解開布袋結頭淈淈𣸩𣸩何似生遼天鶻萬里雲只一突上堂三年一閏九日重陽理由事顯事逐理彰僧問雲門如何是諸佛出身處門云東山水上行且道明理耶明事耶者裏道得脫體分明許你入阿字法門冬至小參山中無曆日從教運推移眼裏有瞳人要見陰陽消長時節既至事理全彰二三四七只言自知十萬八千徒勞他覓洞山果子賣弄風流皓老布裩價增十倍香嚴叉手少實多虗慈明揭榜揚聲止響驀拈主丈掃蕩多年滯貨坐斷諸方舌頭卓主丈冬不寒臘後看上堂僧問香林如何是衲衣下事林云臘月火燒山師云臘月火燒山眉毛眼上安叮嚀辦柴炭必定有春寒上堂懶拈凍筆紀風雲陰極陽生理事真一炷清香林下客太平時節太平人謝徑山行中仁書記上堂一口吸盡西江水馬駒踏殺天下人這箇說話譬如暗中書字字雖不成文彩已彰擊拂子敲出鳳凰五色髓擊碎驪龍明月珠謝兩序上堂新舊相資進退合節左右逢原尊卑異位開鑿人天正眼張佛祖門庭頭頭垂應物之機著著有出身之路如斯話會猶落今時且如何是不落今時底句玲瓏八面自回合峭峻一方誰敢窺上堂舉密菴和尚示衆云十五日已前開池不待月十五日已後池成月自來正當十五日吹無孔笛唱太平歌佛及衆生齊聲唱和且超群拔萃一句作麼生道四海浪平龍睡穩九天雲淨鶴飛高師云山僧今日因行不妨掉臂十五日已前長在途中不離家舍十五日已後長在家舍不離途中正當十五日兩頭俱坐斷一劒倚天寒且超群拔萃一句作麼生道擊拂子一把柳絲收不得和煙搭在玉欄干退院上堂老向山中償宿債拖犁拽耙十三年如今筋骨條條露鼻孔頑然不受穿村草步舊田園桃花如錦柳如煙放教臥月眠雲去飢有青芻渴有泉拍禪牀下座真讚門人師楷文斌汝均等編觀音枯木巖前坐片時輪珠數盡復思惟南詢童子無消息月在波心說向誰魚籃觀音籃裡魚衣內珠左提右挈腥風滿途茫茫宇宙人無數那箇男兒是丈夫達磨聖諦廓然忠言逆耳折蘆渡江事不獲已腳下無風匝匝波滔天沃日從茲始寒山天台山中國清寺裡掃隨身塵埃滿地只知指點笑他人對面有人還笑你拾得爾名拾得拾得者誰不識一字却要題詩禿筆未曾輕點著芭蕉葉上墨淋漓維摩嘆大褒圓彈偏擊小通身是病自救不了引得文殊問疾來狼籍一場非小小朝陽穿破衲穴鼻針無絲線蹙斷雙眉討頭未見日炙風吹破衲衣補得完全是幾時對月了殘經看未了歇不得向下文長付在來日咄者醃黑豆老僧何曾解轉如是經船子天無四壁地無門舞棹呈橈誑後昆索性和船都覆却免教空記刻舟痕永明壽禪師道大德尊宗通眼活萬象森羅熾然而說游戲性海而一波不驚披露覺天而十日竝出實天台韶國師命世之寧馨作兩浙錢大王福田之利益至於秉五色筆發佛祖潛光鼓無絃琴起衲僧痼疾高風遠度豐功偉蹟豈片言隻字讚歎之所能及咦面目分明不覆藏西湖水映中巖月延慶秋墟入法師秋水兮澄神金沙兮粲彩百界分身面目儼在闢一乘唱導之妙門泯三觀互融之性海其應物也清而有容其行己也廉而匪介豹澤霧以自文鵬搏風而何快不即不離無對無待入死出生脫袍著鎧聿昭法智中興之行業克振大蓬單傳之家世我作讚語擬針投芥豈特是播德音於一時庶幾乎發潛光於千載元叟和尚真瑞巖安長老請凌霄峰頂寂照光中百年大夢四海一翁眼裏無筋眇郢人斫堊之妙腕頭者力陋女媧鍊石之功指麾談笑而衲僧乞命之不暇暗嗚吒咤而魔外却走以何從前無佛祖下絶己躬黃蘗運攙坐南泉鉢位顏卍菴凌滅妙喜門風父不慈子不孝上不敬下不恭一點水墨兩處成龍安知末後全提句瑞雪天香滿浙東我菴法師真嗣子中絶照請賢哉人也神凝而氣完言溫而行粹允執厥中絶照非外白璧兮無瑕明珠兮絶纇據牀座於兩浙大家紹箕裘於靈山一會瀾翻舌本浚教海之淵源富贍筆端作宗門之洙泗處人情於毀譽得失之間達法性於談笑死生之際堂堂我菴面目儼爾慈光德色遍藂林下載清風殊未已龍翔曇芳和尚巍巍堂堂煒煒煌煌僧中之寶法中之王玉應金舂續破砂盆六傳之逸響霜叨雪虐燦優鉢羅五葉之奇芳言法華曾升御榻光佛照五宿觀堂視名聞利養如垢衣糞土以慈悲喜捨為河筏津梁氣吞萬衲眼蓋諸方讚嘆莫能及描貌不相當父子不傳真妙訣凌霄峰頂發天香太平古鏡和尚古鏡高懸寒光湛湛佛祖潛踪天魔落膽龜毛拂擊木無聲苕柄敲空作響發雙徑不傳之傳歌太平無象之象突出宣州花木瓜抹過東山鐵餕餡護聖青山和尚白璧無瑕明珠絶纇坐斷諸方舌頭提持向上巴鼻編蒲養母凜陳尊宿之高風茅舍深居續常禪師之遠志閲世等行雲無心嗜閒如啖蔗有味須彌為筆不足以美盛德之形容江河為口庶幾乎發斯文之源委徒弟大用都寺請倒拈栗棘與金圈坐斷威音大劫前賤似黃金貴如土好兒終不使爺錢福唐文斌侍者請村草步頭産此芽孽毒氣流行閩蜀江浙著則眼睛枯嗅著則腦門裂死却衲子偷心納盡諸方敗闕殃害叢林卒未休父子不傳真妙訣山行壽像浮世能得幾時閒老我青松白石間霜竹一尋聊作伴近聽流水遠看山偈頌門人處林雲岑等編送岑侍者參方衲僧行履處遍界沒踪跡撥草與瞻風先聖儼遺則塵勞八萬門門門皆可入應須辨主賓慎勿落階級揚眉瞬目間機鋒巧相直國師喚侍者青天轟霹靂侍者酬國師天岸一團日男兒四方志所向隨所適吳疆會有終楚甸來無極腳瘦草鞋寬辛苦竟何益學道如學射久久自中的直教心手兩俱忘拶透銀山并鐵壁贈中竺囦藏主衲僧家沒巴鼻主丈一枝藤草鞋六箇耳南北東西無定止大事未明如喪考妣有甚閒心情遊山并玩水拾得如來藏裏珠認著依然還不是揚向圾垃堆頭一任匙挑不起待他時節因緣自然放光動地寶掌巖前歸去來擡頭撞著自家底謝炬藏主寄七佛石刻付法偈向上一句子不在威音前字義炳日月翰墨動人天意想不可到況復以言宣若云有所付是法成妄傳匡廬古崖石摩勒亦有年上人事幽討掇贈非偶然豈特起衰墮直使空蓋纏揭之素壁間七佛常現前送禮維那之兩府興化為人徹底漢覿面全提如閃電克賓不入者保社罰錢喫棒趂出院天童年老少機關衲僧自合知方便茫茫淮甸接天長金碧樓臺倚雲漢六朝風物足觀光莫教失却空王殿送龜山運上人衲僧門下有一句當機覿面無主賓春風一夜掃殘雪天岸忽覩五色麟無心碗裏空王飯直教一飽忘飢嗔瞻風撥草豈細事下情不精安得真上人自是七閩秀虗心善應谷有神叢林寥落愜老眼行行莫負青春身示勗侍者鳥窠吹布毛侍者便悟去拶透嶮崖機截斷聖凡路不是玄中玄亦非句中句玉兔挨開碧海門金烏飛上珊瑚樹送空維那興化打克賓無事閒相惱諸方受熱瞞商量閙浩浩若是活衲僧不向那邊討秋初夏末時南北東西道之子行行好善為萬里長空淨如掃送藪首座遊金陵兼柬蔣山正宗和尚此軒今年七十九拈得鼻孔失却口一尋霜木挂寒松閒看白雲變蒼狗有客有客來何從靈鷲峰前天竺後兜率宮中說法回玉雪精神驚老醜檢點衣單一物無鋪張手面千般有蟭螟眼裡蹴鞦韆虗空背上翻筋斗匇匇取別大無端利生求法尋初友珍重梁園寶志公多年拋却軒中叟江西源上人歸廬阜衡嶽峰頭雲鄱陽湖裡水雲水兩無心相思隔千里主丈七尺長草鞋六箇耳去去宜善為總是自家底寄南湖我菴法師奕世台衡一大家軒橫青玉映金沙兒郎羯末毋多讓閥閲崔盧未足誇蓮沼重重涵止水猊臺日日雨新花雪山香草煩休戀群稚盈門待賜車送慍藏主歸省徑山元叟和尚山頭老漢八十一如此東南大法城雙𩯭又添新歲白片言能使古風清為人不用擊虎術養子寧忘䑛犢情明月堂前坐深夜餘光分得到長庚贈照堂楊居士進修茫茫只向外邊求自己靈光本自優直下了無諸法相從來不挂一絲頭休令白璧生微玷任使明珠混濁流為語照堂楊處士神仙何必更封侯贈雪峰鏡侍者當軒寶鑑鎮長開湛湛寒光徹夜臺萬象森羅歸一照十方世界絶纖埃直饒南嶽磨成得爭似東平打破來笑看菱花生碓觜春風謾殺老黃梅建新僧堂大家看取好僧堂一柱依然拄一梁太白名山天下勝隰州古佛法中王三條椽下乾坤闊七尺單前日月長坐臥經行如是住自然身放白豪光次月江和尚韻送何山句侍者何山山裏鄮峰前一句臨機未易宣養羽靈禽宜擇木追風良馬不須鞭花開少室人歸國月滿華亭客上船老去逢君無限意相看話到普通年瑩上人還鄉七閩山水秀天南欲去無因老未甘羡子端如新乳犢嗟吾已作欲眠蠶鄉緣美惡宜深省世味醇醨要飽諳珍重祖師門下客蒼龍不許臥澄潭送育王邂維那禮祖須信壺中別有天行藏直到古皇前一爐芋火輕五鼎滿屋松風直萬錢禪榻未應嫌敗簀祖庭毋惜掃頽磚鄮峰送子寧無意臂曲何曾向外邊次韻贈上竺禮闍梨兼柬靈石禪師信之一字道之元色見聲求也大難六用門頭如是住無生路上作何觀禪林風月渾披露教海波瀾盡揭翻寄語老禪無恙不嘉禾春水緑當軒次無言和尚韻送京維那十聲椎下禿却舌百尺竿頭轉得身散宅破家應此子守株緣木更何人松枝凍徹巖前雪桃蕚香浮洞裏春好向龍門重蛻骨誰云獨角有祥麟用前人韻送正上人此事本來無缺缺有心用處卒難周紛紛黑白徒名貌往往朱黃錯校讎撥草瞻風休特地逢場作戲且隨流別峰他日如相見與子重圓舊話頭悼楚藏主春雨菴無際和尚徒弟古人三十為一世非天而亡義所安信是有形從物化可能無念到才難長庚影裏言猶在春雨聲中夢未寒回首重重華藏海擬於何地著悲酸隆知客禮祖卓錐無地亦無錐獨露堂堂信不疑全主全賓皆在我入魔入佛更由誰機先能縱復能奪句下絶毫還絶厘滿地落花春已老祖翁密意幾人知送慍藏主參紫籜竺元和尚我此軒中如斗大與誰擕手話門風曹溪有路無人到少室無人有路通何暇閒情供想像只留老眼送歸鴻此行莫怪無多囑東海于今一暮翁次北隱和尚韻送惠侍者歸潮陽少室春光過眼非風前獨立思依依江煙岸柳絲千尺㵎水山花錦一機莫向目前明得喪好於言下洞玄微潮陽舊路如天遠此日何妨擺手歸贈寫真厲月泉空裏浮埃鏡裏塵一彈指頃百年身了知本體元無相謾說毫端別有神鶴髮雞皮誰似我虎頭燕頷彼何人相逢底用閒描貌明月秋泉自逼真藏室出頭無好手退步足安身佛眼覷不著凡情見得親寰中千世界量外一微塵堪笑毗耶老重開不二門牧庵大師回龍翔後生端可畏克念事參尋佛法自南北江山無古今澤毛憐霧豹養羽惜庭禽去去重回首百城煙水深題眴藏主藏春閣道人行履處密室不通風百念寒灰後一身和氣中餘生未有限此道樂無窮竟日冥心坐瓶花糝桉紅謨上人參方佛法遍天下談玄口不開萬機俱𥨊削一物不將來是處是慈氏無門無善財龜毛并兔角移向眼中栽蔣山勝維那回江西法戰場中得勝歸鷹巢飛出鳳凰兒升堂打鼓普請看笑倒江西馬簸箕贈東林忍侍者日本人虎溪截斷鴈門關一句臨機下口難夜半扶桑日頭出金雞飛上玉闌干寄靈石和尚南山老虎齒無齦撲面腥風不可聞射石虗聲徒沒羽只應羞殺李將軍堅上人禮補陀誰家屋裡沒觀音底事區區向外尋迢𮞏海山行一轉落花芳草又春深示泉南湛上人湛然不動是真常少室門中未𤺊當大地撮來如粟粒木毬無口笑曾郎送栖維那參淨慈靈石和尚南山萬疊錦雲屏宗鏡堂高不易登熱喝嗔拳須照顧從來老子沒鄉情送雪竇亨藏主胸次不留元字腳一大藏教眼中塵春歸錦鏡花如海莫謗如來正法輪便舟不施櫓棹不張帆萬里鯨波指顧間滿載驪珠三百斛打頭不怕浪如山示均侍者莫怪天童口門窄從來無法可商量犀牛扇子破了也嬴得清風滿大唐圓上人江西禮祖叵耐江西馬簸箕和麩糶討便宜承虗接響八十四此去從頭捉敗伊題無無居士集注全剛經諸法皆從此經出借問從何出此經離却此經詮注得那時居士筆方靈富上人歸龍華省師是何魔魅教行腳是何魔魅教出家老我不能窮詰汝就煩歸去問龍華示磻上人瑞巖長喚主人翁業識茫茫未得空今日天童重指出又揚家醜向渠儂成淨人參方菩提無樹鏡非臺兔角龜毛眼裡栽拖箇娘生臭皮袋朝游南嶽暮天台聞鍾鐘聲歷歷報朝昏下徹幽泉上徹雲塞却耳根須聽取勞生誰復反聞聞淨髮張生求佛病祖病衆生病何似衲僧毛病多識得病根無起處吹毛用了急須磨送長蘆然維那入閩禮祖淮山法戰偶不勝竿木隨身入瘴鄉百草頭邊輕撥著休言佛法在南方道者普圓之天台誰言道者少機關慣向人前放軟頑一對眼睛烏律律天台勘破老寒山南上人禮補陀游天台南能北秀各分宗墮在是非區宇中踏斷石橋心路絶腳頭何處不圓通悼無異和尚千丈巖前陷虎機當陽拈出有誰知髑髏乾盡眼睛活正是虗空落地時贈澄院主丹霞投宿值天寒木佛燒來滿屋煙院主眉鬚都落盡諸方多是錯流傳壽侍者歸閩省師執侍巾瓶志已酬臨風南望賦歸休玄沙不出飛鳶嶺築破娘生腳指頭次月江和尚韻送顯上人游補陀天台石橋南畔海門東大士聲聞不易逢未跨船舷相見了縵天網子百千重贈術士陳景猷我與虗空同壽量虗空亦與我同年先生算得虗空定我與虗空出命錢言侍者回閩天童送子有一句蠱毒之家水莫嘗即栗迸開天地眼耽源無口罵南陽寶藏主禮祖參方天然一寶祕形山不在乾坤宇宙間未展炊巾如搆得老胡雙耳帶金環寧侍者省師于閩吐却諸方五味禪哥羅管你米疆年到家不用呈圓相密意明明在汝邊嵩上人歸泉南泉南佛國露堂堂千古靈踪有耿光九到三登徒費力不妨歸去問曾郎示表上人杜䳌聲裡三更月楊柳枝頭二月春打失眼睛拈得鼻從教落賴在風塵住知送還吳家住吳淞煙水鄉迢迢古路接天長相逢底用論賓主一句分明沒覆藏密海千重百匝不通風誰解窮源到劫空會得一漚曾未發滔滔江漢盡朝宗送志維那游金陵克賓不入者保社興化徒施陷虎機明日石頭城畔去空山老我望東歸存上人禮峨眉五臺游天台回江西金色界中銀色界腳頭一步不曾移天台若見寒山子應問江西馬簸箕竺芳達磨不來東土二祖不往西天會得花開五葉休言教外別傳日本巨藏主省師唐土澄清拙扶桑一國師少林無孔笛一任逆風吹四威儀山中行烏藤七尺長回首松關外前村已夕陽山中住家醜休呈露糲飯淡黃虀無鹽又無醋山中坐善因招惡果達磨老臊胡無端成話墮山中臥老鼠牀頭過仰面視屋梁知心無一箇十二時歌雞鳴丑拈得鼻孔失却口門頭戶底閙啾啾李四張三競頭走平旦寅世間宜假不宜真自家肚皮自擘劃不用低頭更問人日出卯摘草拈花爭鬪巧莫教撞著當行家狼藉一場非小小食時辰砂鍋五合煮黃陳粗餐雖然易得飽不如細嚼味方真禺中巳從生至老只如此達磨無端強出頭被人打落當門齒日南午苦中之樂樂中苦無位真人笑漏腮燈籠吞却露明柱日昳未鬼面神頭誰識你當機若更問如何一時撒向長江裡晡時申眼底寥寥絶四鄰客來莫怪無茶點蒿湯一盞當殷勤日入酉剩得一雙窮相手樓閣門開彈指間善財童子逢初友黃昏戌自己工夫缺綿密斂衣獨坐審思量今日六兮明日七人定亥只麼惺惺要長在淺草平田差路多莫教失腳無明海半夜子自倒依然還自起重尋殘夢了無踪不覺天明透窗紙天童平石禪師初見老圓應於乳峯如登東山而小魯再參於玲瓏巖如登泰山而小天下三十年後踵父翁之故武大其家世操縱豫奪倒行逆施如餓於菟反睨其父摵碎破沙盆撲滅文武火拗折蓬蒿箭裂破鐵絲網師之道至是而光明盛大猶衆星之中孤月也先輩有言楊岐不得白雲保寧晦堂不得死心靈源其餘碌碌難為接足余於平石翁亦云後至元二年丙子春住阿育王山松月比丘正印拜題
